<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Selector</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        .mapa {
            max-width: 100%;
            margin-top: 20px;
        }

        #mapInput {
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="wrapper-conteudo">
        <div role="main">
            <div id="home" class="section">
                <h2>Mapa atual</h2>
                <div>
                    <input type="number" id="mapInput" placeholder="Digite o número do mapa">
                    <button onclick="changeMap()">Mudar Mapa</button>
                </div>
                <div class="mapa">
                    <img id="mapImage" src="" alt="Mapa do Território" onclick="openFullscreen(this.src)">
                </div>
            </div>
        </div>
    </div>

    <script>
        const mapImages = [
            "Img/Alto Timirim/Alto Timirim Mapa 1.jpg",
            "Img/Alto Timirim/Alto Timirim Mapa 2.jpg",
            "Img/Timirim/Timirim Mapa 3.jpg",
            "Img/Timirim/Timirim Mapa 4.jpg",
            "Img/Timirim/Timirim Mapa 5.jpg",
            "Img/timirim/timirim Mapa 6.jpg",
            "Img/timirim/timirim Mapa 7.jpg",
            "Img/Olaria/Olaria mapa 8.jpg",
            "Img/Olaria/Olaria mapa 9.jpg",
            "Img/Olaria/Olaria mapa 10.jpg",
            "Img/Olaria/Olaria mapa 11.jpg",
            "Img/Coqueiro/Coqueiro mapa 12.jpg",
            "Img/John Kennedy/John Kennedy mapa 13.jpg",
            "Img/Santa Maria/Santa Maria 14.jpg",
            "Img/Santa Maria/Santa Maria 15.jpg",
            "Img/Santa Maria/Santa Maria 16.jpg",
            "Img/Santa Maria/Santa Maria 17.jpg",
            "Img/Primavera/Primavera Mapa 18.jpg",
            "Img/Primavera/Primavera Mapa 19.jpg",
            "Img/Primavera/Primavera Mapa 20.jpg",
            "Img/Primavera/Primavera Mapa 21.jpg",
            "Img/Primavera/Primavera Mapa 22.jpg",
            "Img/Jardim Primavera/Jardim Primavera Mapa 23.jpg",
            "Img/João XII/JoãoXIII Mapa 24.jpg",
            "Img/João XII/JoãoXIII Mapa 25.jpg",
            "Img/corrego do caçador/corrego do caçador Mapa 26.jpg",
            "Img/corrego do caçador/corrego do caçador Mapa 27.jpg",
            "Img/Novo Horizonte/Novo Horizonte Mapa 28.jpg",
            "Img/Novo Horizonte/Novo Horizonte Mapa 29.jpg",
            "Img/Novo Horizonte/Novo Horizonte Mapa 30.jpg",
            "Img/Novo Horizonte/Novo Horizonte Mapa 31.jpg",
            "Img/Serenata/Serenata Mapa 32.jpg",
            "Img/Alto Serenata/Alto Serenata Mapa 33.jpg",
            "Img/Quitandinha/Quitandinha Mapa 34 .jpg",
            "Img/Quitandinha/Quitandinha Mapa 35.jpg",
            "Img/Quitandinha/Quitandinha Mapa 36.jpg",
            "Img/Quitandinha/Quitandinha Mapa 37.jpg",
            "Img/Quitandinha/Quitandinha Mapa 38.jpg",
            "Img/Eldorado/Eldorado Mapa 39.jpg",
            "Img/Eldorado/Eldorado Mapa 40.jpg",
            "Img/Eldorado/Eldorado Mapa 41.jpg",

        ];

        function changeMap() {
            const mapInput = document.getElementById('mapInput');
            const mapNumber = parseInt(mapInput.value);

            if (mapNumber >= 1 && mapNumber <= mapImages.length) {
                const mapImage = document.getElementById('mapImage');
                mapImage.src = mapImages[mapNumber - 1];
            } else {
                alert('Número de mapa inválido. Por favor, insira um número entre 1 e ' + mapImages.length);
            }
        }

        function openFullscreen(src) {
            const fullscreenDiv = document.getElementById('fullscreen');
            const fullscreenImg = document.getElementById('fullscreen-img');
            fullscreenImg.src = src;
            fullscreenDiv.style.display = 'flex';
        }

        function closeFullscreen() {
            const fullscreenDiv = document.getElementById('fullscreen');
            fullscreenDiv.style.display = 'none';
        }

        // Initialize with the first map
        document.getElementById('mapImage').src = mapImages[0];
    </script>
</body>

</html>
