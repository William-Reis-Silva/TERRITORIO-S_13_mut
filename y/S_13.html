<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foulario S_13</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="js/Firebaseconfig.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.3.1/jspdf.umd.min.js"></script>

  <style>
    @page {
      size: A4;
      margin: 1cm;
    }

    body {
      width: 21cm;
      height: 29.7cm;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      color: #333;
    }

    h2 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background-color: #f2f2f2;
      color: #333;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    #yearControls {
      text-align: center;
      margin-bottom: 20px;
    }

    #yearControls button {
      margin: 0 10px;
      padding: 10px 20px;
      font-size: 14px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #yearControls button:hover {
      background-color: #45a049;
    }

    #yearControls span {
      font-size: 16px;
      font-weight: bold;
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <h2>REGISTRO DE DESIGNAÇÃO DE TERRITÓRIO</h2>
  <div id="yearControls">
    <button id="prevYearBtn">Ano Anterior</button>
    <span id="serviceYear"></span>
    <button id="nextYearBtn">Próximo Ano</button>
    <button id="generatePdfBtn">Gerar PDF</button>
  </div>
  <table id="territoryTable">
    <thead>
      <tr>
        <th rowspan="2">Terr. n.º</th>
        <th rowspan="2">Última data concluída</th>
        <th colspan="2">Designado para</th>
        <th colspan="2">Designado para</th>
        <th colspan="2">Designado para</th>
        <th colspan="2">Designado para</th>
      </tr>
      <tr>
        <th>Data da designação</th>
        <th>Data da conclusão</th>
        <th>Data da designação</th>
        <th>Data da conclusão</th>
        <th>Data da designação</th>
        <th>Data da conclusão</th>
        <th>Data da designação</th>
        <th>Data da conclusão</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data rows will be filled here using JavaScript -->
    </tbody>
  </table>
  <script src="js/S_13.js"></script>
  <script src="js/generatePdf.js"></script>
</body>
</html>
