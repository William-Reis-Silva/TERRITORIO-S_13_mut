<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foulario S_13</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <link rel="stylesheet" href="css/S_13.css"/>
  <script src="js/Firebaseconfig.js"></script>
</head>
<body>
  <h2>REGISTRO DE DESIGNAÇÃO DE TERRITÓRIO</h2>
  <div id="yearControls">
    <button id="prevYearBtn">Ano Anterior</button>
    <span id="serviceYear">xxxx</span>
    <button id="nextYearBtn">Próximo Ano</button>
    <button id="generateExcelBtn">Gerar Excel</button>
  </div>
  <table id="territoryTable">
    <thead>
      <tr>
        <th rowspan="2">Terr. n.º</th>
        <th rowspan="2">Última data concluída</th>
        <th colspan="2">Designado para</th>
        <th colspan="2">Designado para</th>
        <th colspan="2">Designado para</th>
        <th colspan="2">Designado para</th>
      </tr>
      <tr>
        <th>Data da designação</th>
        <th>Data da conclusão</th>
        <th>Data da designação</th>
        <th>Data da conclusão</th>
        <th>Data da designação</th>
        <th>Data da conclusão</th>
        <th>Data da designação</th>
        <th>Data da conclusão</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data rows will be filled here using JavaScript -->
    </tbody>
  </table>
  <script src="js/S_13.js"></script>
  <script>
    document.getElementById("generateExcelBtn").addEventListener("click", function () {
      generateExcel();
    });

    function generateExcel() {
      var table = document.getElementById("territoryTable");
      var wb = XLSX.utils.book_new();
      var ws = XLSX.utils.table_to_sheet(table);

      // Adicionar os títulos
      XLSX.utils.sheet_add_aoa(ws, [
        ["REGISTRO DE DESIGNAÇÃO DE TERRITÓRIO"],
        ["Ano de Serviço:", document.getElementById("serviceYear").innerText]
      ], { origin: "A1" });

      // Mover a tabela para baixo
      XLSX.utils.sheet_add_aoa(ws, XLSX.utils.sheet_to_json(ws, { header: 1 }), { origin: "A4" });

      // Ajustar largura das colunas para caber na largura de uma folha A4
      var colWidths = [
        { wch: 10 }, // Terr. n.º
        { wch: 20 }, // Última data concluída
        { wch: 15 }, // Data da designação 1
        { wch: 15 }, // Data da conclusão 1
        { wch: 15 }, // Data da designação 2
        { wch: 15 }, // Data da conclusão 2
        { wch: 15 }, // Data da designação 3
        { wch: 15 }, // Data da conclusão 3
        { wch: 15 }, // Data da designação 4
        { wch: 15 }  // Data da conclusão 4
      ];
      ws['!cols'] = colWidths;

      // Definir estilos e bordas para todas as células
      var borderStyle = {
        top: { style: "thin" },
        bottom: { style: "thin" },
        left: { style: "thin" },
        right: { style: "thin" }
      };

      var titleStyle = {
        font: { name: "Arial", bold: true, sz: 14 },
        alignment: { horizontal: "center", vertical: "center" }
      };

      var subtitleStyle = {
        font: { name: "Arial", bold: true, sz: 12 },
        alignment: { horizontal: "left", vertical: "center" }
      };

      var headerStyle = {
        font: { name: "Arial", bold: true, sz: 9 },
        alignment: { horizontal: "center", vertical: "center" },
        border: borderStyle,
        fill: { fgColor: { rgb: "FFFF00" } }
      };

      var dataStyle = {
        font: { name: "Arial", sz: 7 },
        alignment: { horizontal: "center", vertical: "center" },
        border: borderStyle
      };

      // Aplicar estilos
      var range = XLSX.utils.decode_range(ws['!ref']);
      for (var R = range.s.r; R <= range.e.r; ++R) {
        for (var C = range.s.c; C <= range.e.c; ++C) {
          var cell_address = XLSX.utils.encode_cell({ r: R, c: C });
          if (!ws[cell_address]) continue;
          if (R === 0) { // Title row
            ws[cell_address].s = titleStyle;
          } else if (R === 1) { // Subtitle row
            ws[cell_address].s = subtitleStyle;
          } else if (R === 2 || R === 3) { // Header rows
            ws[cell_address].s = headerStyle;
          } else { // Data rows
            ws[cell_address].s = dataStyle;
          }
        }
      }

      // Mesclar células do título
      ws['!merges'] = [
        { s: { r: 0, c: 0 }, e: { r: 0, c: 9 } }, // Title row
        { s: { r: 1, c: 0 }, e: { r: 1, c: 9 } }  // Subtitle row
      ];

      // Adicionar a planilha ao workbook
      XLSX.utils.book_append_sheet(wb, ws, "Registro");

      // Salvar o arquivo Excel
      var wbout = XLSX.write(wb, { bookType: "xlsx", type: "binary" });

      function s2ab(s) {
        var buf = new ArrayBuffer(s.length);
        var view = new Uint8Array(buf);
        for (var i = 0; i < s.length; i++) view[i] = s.charCodeAt(i) & 0xFF;
        return buf;
      }

      saveAs(
        new Blob([s2ab(wbout)], { type: "application/octet-stream" }),
        "Registro_Designacao_Territorio.xlsx"
      );
    }
  </script>
</body>
</html>
