<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização de Programação</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="../js/Firebaseconfig.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group label {
            font-weight: 600;
            color: #495057;
        }

        .control-group input,
        .control-group select {
            padding: 10px 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6c757d;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .content {
            padding: 30px;
        }

        .month-section {
            margin-bottom: 40px;
        }

        .month-title {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .week-grid {
            display: grid;
            gap: 15px;
        }

        .week-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }

       
        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dee2e6;
        }

        .week-date {
            font-weight: 600;
            color: #495057;
            font-size: 1.1em;
        }

        .day-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .sabado-badge {
            background: #667eea;
            color: white;
        }

        .domingo-badge {
            background: #38ef7d;
            color: white;
        }

        .week-info {
            display: grid;
            gap: 10px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-label {
            font-weight: 600;
            color: #6c757d;
            min-width: 120px;
        }

        .info-value {
            color: #212529;
            font-size: 1.05em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #e9ecef;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #6c757d;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .control-group {
                flex-direction: column;
                align-items: stretch;
            }

            .header h1 {
                font-size: 1.8em;
            }
            .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
            gap: 10px;
            padding: 30px;
            background: #f8f9fa;
        }

        .stat-card {
            background: white;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #e9ecef;
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #6c757d;
            font-size: 0.9em;
            margin-top: 5px;
        }

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Programação de Campo</h1>
            <p>Visualize a programação anual de atividades</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="ano-visualizar">Ano:</label>
                <input type="number" id="ano-visualizar" min="2000" max="2100" value="2026">
                
                <label for="mes-filtro">Mês:</label>
                <select id="mes-filtro">
                    <option value="">Todos os meses</option>
                    <option value="0">Janeiro</option>
                    <option value="1">Fevereiro</option>
                    <option value="2">Março</option>
                    <option value="3">Abril</option>
                    <option value="4">Maio</option>
                    <option value="5">Junho</option>
                    <option value="6">Julho</option>
                    <option value="7">Agosto</option>
                    <option value="8">Setembro</option>
                    <option value="9">Outubro</option>
                    <option value="10">Novembro</option>
                    <option value="11">Dezembro</option>
                </select>

                <button class="btn btn-primary" onclick="carregarProgramacao()">
                    🔍 Carregar
                </button>
                
            </div>
        </div>

        <div id="stats-container"></div>

        <div class="content" id="content">
            <div class="empty-state">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <h3>Selecione um ano e clique em Carregar</h3>
                <p>A programação será exibida aqui</p>
            </div>
        </div>
    </div>

    <script>
        let programacaoCache = null;

        // Função para formatar data
        function formatarData(data) {
            const meses = [
                "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
                "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
            ];
            return `${data.getDate()} de ${meses[data.getMonth()]} de ${data.getFullYear()}`;
        }

        // Carregar programação do Firebase
        async function carregarProgramacao() {
            const ano = document.getElementById('ano-visualizar').value;
            const mesFiltro = document.getElementById('mes-filtro').value;
            const content = document.getElementById('content');
            const btnExportar = document.getElementById('btn-exportar');

            if (!ano) {
                alert('Informe um ano válido');
                return;
            }

            // Mostrar loading
            content.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando programação de ${ano}...</p>
                </div>
            `;

            try {
                // Simular Firebase (você vai substituir isso)
                const db = firebase.firestore();
                const snapshot = await db
                    .collection('programacao')
                    .doc(String(ano))
                    .collection('agendamentos')
                    .get();

                if (snapshot.empty) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <h3>Nenhuma programação encontrada</h3>
                            <p>Não há dados para o ano ${ano}</p>
                        </div>
                    `;
                    btnExportar.disabled = true;
                    return;
                }

                // Organizar dados
                const dados = {};
                snapshot.forEach(doc => {
                    const [tipo, dataStr] = doc.id.split('_');
                    const [y, m, d] = dataStr.split('-');
                    const data = new Date(y, m - 1, d);
                    
                    if (mesFiltro !== '' && data.getMonth() !== parseInt(mesFiltro)) {
                        return;
                    }

                    const mes = data.getMonth();
                    const semana = Math.ceil(data.getDate() / 7);
                    const chave = `${mes}-${semana}`;

                    if (!dados[chave]) {
                        dados[chave] = {
                            mes,
                            semana,
                            sabado: null,
                            domingo: null,
                            idosos: null
                        };
                    }

                    if (tipo === 'sabado') {
                        dados[chave].sabado = {
                            data,
                            dirigente: doc.data().dirigente
                        };
                    } else if (tipo === 'domingo') {
                        dados[chave].domingo = {
                            data,
                            grupo: doc.data().grupo
                        };
                    } else if (tipo === 'idosos') {
                        dados[chave].idosos = {
                            data,
                            idoso: doc.data().idoso,
                            acompanhante: doc.data().acompanhante
                        };
                    }
                });

                programacaoCache = dados;
                renderizarProgramacao(dados, ano);
              

            } catch (error) {
                console.error('Erro ao carregar:', error);
                content.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ Erro ao carregar</h3>
                        <p>${error.message}</p>
                    </div>
                `;
              
            }
        }

        // Renderizar programação
        function renderizarProgramacao(dados, ano) {
            const content = document.getElementById('content');
            const meses = [
                "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
                "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
            ];

            // Calcular estatísticas
            let totalSabados = 0;
            let totalDomingos = 0;
            let totalIdosos = 0;

            Object.values(dados).forEach(semana => {
                if (semana.sabado) totalSabados++;
                if (semana.domingo) totalDomingos++;
                if (semana.idosos) totalIdosos++;
            });

            // Renderizar estatísticas
            document.getElementById('stats-container').innerHTML = `
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number">${totalSabados}</div>
                        <div class="stat-label">Sábados</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${totalDomingos}</div>
                        <div class="stat-label">Domingos</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${totalIdosos}</div>
                        <div class="stat-label">Idosos</div>
                    </div>
                </div>
            `;

            // Agrupar por mês
            const porMes = {};
            Object.values(dados).forEach(semana => {
                if (!porMes[semana.mes]) {
                    porMes[semana.mes] = [];
                }
                porMes[semana.mes].push(semana);
            });

            // Renderizar conteúdo
            let html = '';
            Object.keys(porMes).sort((a, b) => a - b).forEach(mes => {
                html += `
                    <div class="month-section">
                        <h2 class="month-title">${meses[mes]} ${ano}</h2>
                        <div class="week-grid">
                `;

                porMes[mes].forEach(semana => {
                    if (semana.sabado) {
                        html += `
                            <div class="week-card">
                                <div class="week-header">
                                    <div class="week-date">${formatarData(semana.sabado.data)}</div>
                                    <div class="day-badge sabado-badge">Sábado</div>
                                </div>
                                <div class="week-info">
                                    <div class="info-row">
                                        <span class="info-label">🎤 Dirigente:</span>
                                        <span class="info-value">${semana.sabado.dirigente}</span>
                                    </div>
                                    ${semana.idosos ? `
                                        <div class="info-row">
                                            <span class="info-label">👴 Idoso:</span>
                                            <span class="info-value">${semana.idosos.idoso}</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="info-label">🤝 Acompanhante:</span>
                                            <span class="info-value">${semana.idosos.acompanhante}</span>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    }

                    if (semana.domingo) {
                        html += `
                            <div class="week-card">
                                <div class="week-header">
                                    <div class="week-date">${formatarData(semana.domingo.data)}</div>
                                    <div class="day-badge domingo-badge">Domingo</div>
                                </div>
                                <div class="week-info">
                                    <div class="info-row">
                                        <span class="info-label">👥 Grupo:</span>
                                        <span class="info-value">${semana.domingo.grupo}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });

                html += `
                        </div>
                    </div>
                `;
            });

            content.innerHTML = html;
        }

        // Exportar para HTML
        function exportarHTML() {
            if (!programacaoCache) {
                alert('Carregue a programação primeiro');
                return;
            }

            const ano = document.getElementById('ano-visualizar').value;
            const htmlCompleto = document.documentElement.outerHTML;
            
            // Criar blob e download
            const blob = new Blob([htmlCompleto], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `programacao_${ano}.html`;
            a.click();
            URL.revokeObjectURL(url);

            alert('HTML exportado com sucesso!');
        }
    </script>
</body>
</html>
