<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização de Programação</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <script src="../js/Firebaseconfig.js"></script>
    <link rel="stylesheet" href="CSS/view_progamacao.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Programação de Campo</h1>
            <p>Visualize a programação anual de atividades com estilo</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="ano-visualizar">Ano:</label>
                <input type="number" id="ano-visualizar" min="2000" max="2100" value="2026">
                
                <label for="mes-filtro">Mês:</label>
                <select id="mes-filtro" onchange="aplicarFiltro()">
                    <option value="">Todos os meses</option>
                    <option value="0">Janeiro</option>
                    <option value="1">Fevereiro</option>
                    <option value="2">Março</option>
                    <option value="3">Abril</option>
                    <option value="4">Maio</option>
                    <option value="5">Junho</option>
                    <option value="6">Julho</option>
                    <option value="7">Agosto</option>
                    <option value="8">Setembro</option>
                    <option value="9">Outubro</option>
                    <option value="10">Novembro</option>
                    <option value="11">Dezembro</option>
                </select>

                <button class="btn btn-primary" onclick="carregarProgramacao()">
                    🔍 Carregar
                </button>
            </div>
        </div>

        <div class="content" id="content">
            <div class="empty-state">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <h3>Selecione um ano e clique em Carregar</h3>
                <p>A programação será exibida aqui com um design incrível</p>
            </div>
        </div>
    </div>
    <script src="view_progamacao.js"></script>
</body>
</html>
