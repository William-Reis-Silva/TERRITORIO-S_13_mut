<!DOCTYPE html>
<html lang="pt-br">

  <head>
    <meta charset="UTF-8" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="CSS/style.css" />
    <link rel="stylesheet" href="../css/tema.css" />
    <link rel="shortcut icon" href="../img/icone-192.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase_config.js"></script>
    <title>Controle de Território</title>
  </head>

  <body>
    <div class="wrapper-conteudo">
      <header>
        <nav class="nav-bar">
          <div id="logo">
            <img src="../img/icone-32x32.png" alt="logo" />
          </div>
          <div class="nav-list">
            <ul>
              <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
              </li>
              <li class="nav-item dropdown">
                <a href="#" class="nav-link">Mapas</a>
                <ul class="dropdown-menu" id="dropdown-mapas">
                  <!-- Carregado via Prog_campo.js -->
                </ul>
              </li>
              <li class="nav-item">
                <a href="view_progamacao.html" class="nav-link">Programação</a>
              </li>

              <li class="nav-item"><a href="index_territorio.html" class="nav-link">Voltar</a></li>
              </li>
            </ul>
          </div>
        </nav>
      </header>
    </div>
    <main>
      <div class="tabela">
        <div class="section" style="display:block; text-align: center; margin-bottom: 10px;">
          <button id="semana-anterior">⬅ Semana anterior</button>
          <button id="semana-proxima">Semana seguinte ➡</button>
        </div>
        <div id="home" class="section" style="display:block;">
          <table id="tabela-atividades">
            <caption id="title">Programação de Campo<br>
              <spn id="semana-atual" style="font-weight: bold; text-align: center;"></spn>
            </caption>

            <thead>
              <tr>
                <th>Dia</th>
                <th>Modalidade</th>
                <th>Hora</th>
                <th>Dirigente</th>
                <th>Saída</th>
              </tr>
            </thead>
            <tbody id="corpo-tabela-programacao">
              <!-- Segunda a Sexta são carregados do config/geral,
                   Sábado e Domingo vêm dos agendamentos no Prog_campo.js -->
            </tbody>
          </table>
        </div>
        <div id="home-idoso" class="section" style="display:block;">
          <table id="tabela-idoso">
            <caption class="idosos">Trabalho especial com os idosos</caption>
            <thead>
              <tr>
                <th class="idoso">Dia</th>
                <th class="idoso">Idoso</th>
                <th class="idoso">Dirigente</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Sábado 09:00</td>
                <td id="idoso"></td>
                <td id="acompanhante"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div id="mapas">
        <!-- Renderizado dinamicamente pelo Prog_campo.js agrupando territórios por bairro -->
      </div>
      <div class="fullscreen" id="fullscreen" onclick="closeFullscreen()">
        <img id="fullscreen-img" src="" alt="Imagem em tela cheia">
      </div>
      </div>
    </main>


    <script>
      function showSection(sectionId) {
        const sections = document.querySelectorAll('.section');
        sections.forEach(section => {
          section.style.display = 'none';
        });
        const activeSection = document.getElementById(sectionId);
        if (activeSection) {
          activeSection.style.display = 'block';
        }
      }
      document.querySelectorAll('.dropdown').forEach(dropdown => {
        dropdown.addEventListener('click', function (e) {
          e.preventDefault();
          const submenu = this.querySelector('.dropdown-menu');
          submenu.classList.toggle('show');
        });
      });
    </script>
    <script src="Prog_campo.js"></script>
    <script src="tela_cheia.js"></script>
  </body>

</html>
