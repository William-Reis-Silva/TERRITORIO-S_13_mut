<!DOCTYPE html>
<html lang="pt-br">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="stylesheet" href="css/S_13.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase_config.js"></script>
</head>
<body>
<main>

      <button><a href="Painel/painel.html" class="button">Voltar</a></button>

    <table id="territoryTable">

          <th>Data da designação</th>

      </tbody>
    </table>
</main>
    <script src="js/S_13.js"></script>
    <script src="js/generatePdf.js"></script>
    <script>
      (function(){
        var btn  = document.getElementById('themeToggle');
        var icon = btn.querySelector('i');
        function sync(t) {
          icon.className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }
        sync(document.documentElement.getAttribute('data-theme') || 'dark');
        btn.addEventListener('click', function(){
          var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', t);
          localStorage.setItem('theme', t);
          sync(t);
        });
      })();
    </script>
  </body>
</html>
