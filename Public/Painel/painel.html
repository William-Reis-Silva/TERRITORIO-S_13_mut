<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <title>Painel Admin - Territórios</title>

        <!-- Firebase Scripts -->
        <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <div id="user-greeting">Bem-vindo, <span id="username"></span></div>
            <h1>Painel Administrativo - Territórios</h1>
            <nav>
                <button><a href="../index.html" class="nav-link" target="_blank"> Home</a></button>
                <button onclick="showTab('config')">Configurações</button>
                <button onclick="showTab('relatorio')">Relatório</button>
                <button onclick="showTab('programacao')">Programação</button>
                <button onclick="showTab('gerenciar-escala')">Gerenciar Escalas</button>
                <button><a href="../S_13.html" class="nav-link">Gerar_S13</a></button>

        </header>

        <main>

            <section id="config" class="tab" style="max-width: 800px; margin: auto;">
                <h2>Configurações de Território</h2>
                <form id="config-form">
                    <label>Bairro:
                        <input type="text" id="bairro" placeholder="Ex: Centro">
                    </label>
                    <label>Número do Mapa:
                        <input type="number" id="mapa-config" placeholder="Ex: 1" min="1">
                    </label>
                    <label>Foto do Mapa:
                        <input type="file" id="mapa-foto" accept="image/*">
                        <small style="color: #666;">Selecione uma imagem (JPG, PNG, etc.)</small>
                    </label>
                    <button type="submit">Salvar Território</button>
                </form>
                <div id="config-result"></div>
            </section>

            <section id="programacao" class="tab" style="max-width: 800px; margin: auto;">
                <h1>Gerar Programação Anual</h1>
                <p>
                    Gere ou atualize a escala seguindo o rodízio correto,
                    sem alterar datas passadas.
                </p>

                <label for="ano">Ano:</label>
                <input type="number" id="ano" min="2000" max="2100" value="2026" />

                <br /><br />

                <!-- BOTÃO ORIGINAL (opcional manter) -->
                <button id="gerarFirestore">
                    🗓️ Gerar ano completo (do zero)
                </button>

                <br /><br />

                <!-- NOVO BOTÃO PRINCIPAL -->
                <button id="regerarFuturo"
                    style="background:#2563eb;color:#fff;padding:10px 16px;border:none;border-radius:6px;">
                    🔄 Regerar a partir do próximo fim de semana
                </button>

                <p id="status"></p>
            </section>


            <section id="relatorio" class="tab" style="max-width: 800px; margin: auto;">
                <h2>Relatório</h2>
                <div id="relatorio-result">
                    <p>Carregando dados...</p>
                </div>
            </section>

            <section id="gerenciar-escala" class="tab">
                <iframe id="gerador-escala" src="gerenciamento_escala.html">
                </iframe>
            </section>

        </main>

        <!-- Scripts carregados na ordem correta -->

        <script>
            // Aguardar o Firebase ser inicializado antes de carregar o script principal
            window.addEventListener('load', function () {
                // Verificar se Firebase foi inicializado
                if (typeof firebase === 'undefined') {
                    alert('Erro: Firebase não foi carregado. Verifique a configuração.');
                    return;
                }

                // Carregar script principal
                const script = document.createElement('script');
                script.src = 'script.js';
                document.body.appendChild(script);
            });

            // Função para alternar abas
            const tabs = document.querySelectorAll('.tab');

            function showTab(id) {
                tabs.forEach(tab => {
                    tab.classList.remove('active');
                });
                document.getElementById(id).classList.add('active');

                // Atualizar relatório quando a aba for selecionada
                if (id === 'relatorio') {
                    setTimeout(atualizarRelatorio, 100);
                }
            }
            // Função para voltar
            function voltar() {
                window.location.href = '../index.html'; // Redireciona para a página inicial
            }
        </script>
        <script src="../js/Firebaseconfig.js"></script>
        <script src="programacao.js"></script>
    </body>

</html>
